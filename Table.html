<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table and nested table</title>
</head>
<body>
    Table example
    <table border="1" bordercolor="Pink">
        <tr>
            <th>S.N.</th>
            <th>Student Name</th>
            <th>Address</th>
        </tr>
        <tr>
            <td>1.</td>
            <td>Ram</td>
            <td>kathmandu</td>
        </tr>
        <tr>
            <td>2.</td>
            <td>Sita</td>
            <td>Chitwan</td>
        </tr>
    </table>
    <hr>

    <h2>Nested Table</h2>
    <table border="1" bordercolor="red">
        <tr>
            <td>Table 1</td>
            <td>Table 1
                <Table border="1" bordercolor="green">
                    <tr>
                        <td>Table 2</td>
                        <td>Table 2</td>
                    </tr>
                    <tr>
                        <td>Table 2</td>
                        <td>Table 2</td>
                    </tr>
                </Table>
            </td>
        </tr>
        <tr>
            <td>Table 1</td>
            <td>Table 1</td>
        </tr>
    </table>
    <hr>

    <h2>Row span and col span:</h2>
    <table border="1" bordercolor="Greem">
        <tr>
            <th colspan="2">Class Routine</th>
        </tr>
        <tr>
            <th>Day</th>
            <th>Subject</th>
        </tr> 
        <tr>
            <td>Sunday</td>
            <td>Statistics</td>
        </tr>
        <tr>
            <td>Monday</td>
            <td rowspan="2">Microprocessor</td>
        </tr>
        <tr>
            <td>Tuesday</td>
        </tr>
    </table>
    <hr>

    
</body>
</html>
